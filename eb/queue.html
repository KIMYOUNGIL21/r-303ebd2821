<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Pretendard Variable', Pretendard, -apple-system, sans-serif;
         background:#0f1115; color:#e8eaed; line-height:1.7; padding:26px 14px 80px; }
  .wrap { max-width:560px; margin:0 auto; }
  h1 { font-size:20px; font-weight:800; }
  .sub { color:#9aa0a6; font-size:12.5px; margin:4px 0 18px; }
  .howto { background:#1d2333; border:1px solid #2c3350; border-radius:12px;
           padding:12px 14px; font-size:13px; margin-bottom:22px; }
  .howto b { color:#ffd666; }
  .dayhead { font-size:13px; font-weight:800; color:#ffd666; margin:26px 0 10px; }
  .post { background:#171a21; border:1px solid #262b36; border-radius:16px;
          padding:16px 16px 14px; margin-bottom:12px; }
  .meta { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
  .chip { font-size:11px; font-weight:700; padding:2px 9px; border-radius:20px; background:#232836; color:#aeb6c4; }
  .chip.thr { background:#0d2b3d; color:#7cd3ff; }
  .chip.car { background:#3a1d31; color:#f7a8d8; }
  .chip.hold { background:#3d2f00; color:#ffd666; }
  .body { font-size:14.5px; white-space:pre-line; }
  .slide { background:#101317; border:1px solid #232836; border-radius:10px;
           padding:10px 12px; margin-bottom:8px; font-size:14px; font-weight:600; white-space:pre-line; }
  .slide .no { font-size:10.5px; color:#8a93a3; font-weight:700; margin-bottom:3px; }
  .cap { font-size:12.5px; color:#9aa0a6; white-space:pre-line; margin-top:6px; }
  .note { font-size:12.5px; color:#ff9d66; margin-top:8px; }
  button.copy { margin-top:12px; width:100%; padding:11px; border:0; border-radius:10px;
                background:#2c3350; color:#e8eaed; font-family:inherit; font-size:14px;
                font-weight:700; cursor:pointer; }
  button.copy:active { background:#3a4266; }
  .foot { margin-top:34px; font-size:11.5px; color:#5f6672; }
  .foot a { color:#8ab4f8; }
</style>
</head>
<body>
<div class="wrap">
  <h1>📮 발행 대기함</h1>
  <div class="sub">갱신 2026-07-11 · 복사 버튼 → 쓰레드/인스타 앱에 붙여넣기</div>
  <div class="howto">
    <b>쓰는 법</b><br>
    ① 글 아래 <b>복사</b> 버튼 누르기<br>
    ② 쓰레드(또는 인스타) 앱 열어서 붙여넣기 → 발행<br>
    ③ 카드뉴스는 장별 문구 — 이미지는 컴퓨터에서 자동 생성 예정(2단계)
  </div>
  <div id="list"></div>
  <div class="foot">
    벤치마크 보드 <a href="./index.html">보기</a> · 샘플 <a href="./samples.html">보기</a><br>
    글 추가는 "글 뽑아줘" 한마디 → 자동 갱신됨
  </div>
</div>
<script>
const POSTS = [{"id": "000", "day": "1일차", "소재": 0, "기둥": "B", "type": "threads", "angle": "H8 데뷔 스펙 서사 · T6", "status": "대기", "note": "계정 첫 글 + 프로필 고정. 발행 직전 곡 수(35)·구독자(200 미만) 최신 숫자로 확인.", "text": "안녕, 나는 낮에는 회사원이고 밤에는 가수를 키워.\n사람이 아니라 AI 가수야. 발라드를 불러.\n\n악보도 못 읽는 내가\n지금까지 35곡을 만들어서 유튜브에 올렸어.\n전부 저작권이 내 거야.\n\n구독자는 아직 200이 안 돼.\n대신 mp3만 넣으면 영상 제작부터 발행까지\n자동으로 돌아가는 공장을 만들었지.\n\n이 계정엔 그 과정을 순서대로 남기려고 해.\n넘어진 것까지 전부. (채널 하나를 갈아엎은 적도 있거든)\n\n얼굴 없이 노래로 채널 키우는 이야기,\n궁금하면 팔로우해두고 같이 가."}, {"id": "001", "day": "1일차", "소재": 6, "기둥": "B", "type": "threads", "angle": "H2 사건 서사 · T1", "status": "대기", "text": "채널을 하나 갈아엎은 적이 있어.\n\nAI 커버곡으로 시작했었거든.\n명곡을 AI 목소리로 다시 부르게 하는 거.\n조회수도 제법 나왔어.\n\n근데 어느 날 소름이 돋더라.\n이 채널에 '내 곡'이 한 곡도 없구나.\n원곡 주인이 신고 한 번 하면\n영상이 아니라 채널이 통째로 사라지는 구조였어.\n\n그날 커버를 전부 접고 자작곡으로 갈아탔어.\n지금 올라가 있는 35곡은 전부 내 소유야.\n누가 뭐라 해도 안 무너져.\n\nAI 음악 하려는 사람이 제일 많이 밟는 지뢰가 이거야.\n내일 저작권 지뢰 3개를 정리해서 올릴게.\n팔로우해두면 안 놓쳐."}, {"id": "002", "day": "2일차", "소재": 8, "기둥": "A", "type": "threads", "angle": "H4 기대 뒤집기 + 단언 매뉴얼 · T2", "status": "대기", "text": "AI 음악 채널, 돈 많이 들 것 같지?\n실제로 운영 중인 사람이 알려줄게.\n한 달에 커피 몇 잔 값이야.\n\n1. 곡 만드는 구독 하나 — 이게 거의 전부\n2. 영상 편집 프로그램 — 안 써. 필요 없더라\n3. 마이크, 녹음실 — 부르는 건 AI라 필요 없어\n4. 썸네일 — AI로 만들어\n\n이 판은 돈이 비싼 게 아니라\n순서를 모르는 게 비싸.\n\n저장해뒀다가 시작할 때 다시 봐."}, {"id": "003", "day": "2일차", "소재": 5, "기둥": "A", "type": "threads", "angle": "H6 손실 경고 · T2 (001 연재 회수)", "status": "대기", "text": "어제 말한 저작권 지뢰 3개, 정리할게.\nAI 음악 시작하는 사람 대부분이 이 중 하나는 밟아.\n\n1. 커버곡\n조회수는 제일 빨리 붙어. 근데 신고 한 번이면 영상이 아니라 채널이 사라져. 수익도 원곡 주인 거야.\n\n2. 무료 플랜으로 수익화\n곡 생성 툴 무료 플랜은 상업적 사용이 안 돼. 수익 버튼 켜는 순간 위반이야.\n\n3. '느낌만 비슷하게'\n멜로디를 따라 하면 그것도 지뢰야. 명곡이 주던 감정만 가져오고, 곡은 새로 만들어야 해.\n\n나는 1번을 밟고 채널을 갈아엎었어.\n같은 수업료 내지 말고, 저장해뒀다가 시작 전에 다시 봐."}, {"id": "004", "day": "3일차", "소재": 9, "기둥": "A", "type": "threads", "angle": "H5 숫자 대비 · T2 (저장가치)", "status": "대기", "text": "오늘 밤 30분이면 인생 첫 곡을 만들 수 있어.\n악보 몰라도 돼. 나도 못 읽어.\n\nSTEP 1. 감정 한 줄 정하기 (5분)\n'새벽에 혼자 듣는 위로' — 이런 문장 하나면 돼\n\nSTEP 2. AI랑 가사 초안 뽑기 (10분)\n\nSTEP 3. 수노(Suno)에 넣고 두 버전 뽑기 (10분)\n\nSTEP 4. 더 좋은 쪽 고르기 (5분)\n\n끝. 진짜 이게 전부야.\n나도 이 30분짜리 첫 곡에서 시작해서 35곡까지 왔어.\n\n저장해뒀다가 오늘 밤 해봐.\n막히면 댓글 남겨. 하나씩 풀어줄게."}, {"id": "005", "day": "3일차", "소재": 20, "기둥": "C", "type": "threads", "angle": "H9 질문 인용 · T5 (답글 목표)", "status": "대기", "text": "\"음치인데 AI 음악 채널 되나요?\"\n\n제일 많이 받는 질문인데,\n나 노래방에서 마이크 잘 안 잡아. 악보도 못 읽고.\n\n이 판에 필요한 건 딱 두 개더라.\n\n1. 어떤 감정을 담을지 정하는 것\n2. 나온 곡 중에 좋은 걸 고르는 귀\n\n부르는 건 AI가 해. 고르는 건 내가 하고.\n좋은 노래를 '아는' 사람이면 충분해.\n\n너는 뭐가 걸려서 시작을 못 하고 있어?\n댓글로 남겨줘. 내가 겪은 만큼은 다 답해줄게."}, {"id": "006", "day": "이벤트 (글 6개 발행 후)", "소재": 29, "기둥": "D", "type": "threads", "angle": "H10 무료 나눔 · T7 (성장 엔진)", "status": "보류", "note": "글 6개 이상 발행 + 반응 생긴 뒤 투입. 발행 즉시 프로필 고정 교체. 2~3주 간격 반복.", "text": "AI로 노래 만들어서 유튜브 채널 굴리는 법,\n전자책으로 정리했어. 그냥 풀게.\n\n이론서가 아니야.\n내가 실제 채널 운영하면서 매일 쓰는 순서 그대로 담았어.\n\n1. 시작 전에 무너지는 3가지 이유 (저작권 지뢰 포함)\n2. 월 유지비 전부 공개 — 커피 몇 잔 값\n3. 오늘 밤 30분, 첫 곡 만드는 코스\n\n받는 법\n① 좋아요 + 팔로우 + 리포스트\n② 댓글에 '지도'\n\n확인하는 대로 바로 보내줄게.\n읽고 궁금한 건 얼마든지 물어봐."}, {"id": "007", "day": "예비 B안 (A 반응 보고 5~7일 뒤)", "소재": 6, "기둥": "A", "type": "threads", "angle": "H6 손실 경고 · T4 (001의 B안)", "status": "보류", "note": "001(사건서사)과 같은 소재, 다른 훅. 반응 비교용.", "text": "AI 커버곡으로 유튜브 시작하려는 사람 있으면\n이 글 먼저 읽고 시작해.\n\n커버곡은 조회수가 제일 빨리 붙어.\n그래서 다들 그걸로 시작해.\n근데 그 채널의 곡은 단 한 곡도 네 게 아니야.\n\n원곡 권리자가 신고 한 번 하면\n영상이 아니라 채널이 사라져.\n수익도 애초에 원곡 주인 거고.\n\n나는 이걸 겪고 자작곡으로 갈아탔어.\n지금 내 채널 35곡은 누가 뭐라 해도 안 무너져.\n전부 내 곡이거든.\n\n순서는 이거야: 자작곡 → 채널 → 수익.\n저장해뒀다가 시작 전에 다시 봐."}, {"id": "008", "day": "예비 B안 (A 반응 보고 5~7일 뒤)", "소재": 8, "기둥": "A", "type": "threads", "angle": "H4 기대 뒤집기 · T4 (002의 B안, 댓글 목표)", "status": "보류", "note": "002와 같은 소재, 다른 훅·다른 지표 목표(답글).", "text": "부업 알아보면 다 그럴듯해 보이지.\n근데 대부분 시작하기도 전에 돈부터 나가.\n\n강의 몇십만 원, 장비, 툴 구독.\n배우다가 지쳐서 끝나는 경우가 태반이야.\n\nAI 음악 채널은 반대였어.\n곡 만드는 구독 하나, 커피 몇 잔 값.\n편집 프로그램도 마이크도 얼굴도 필요 없더라.\n\n나는 이걸로 지금 채널을 굴리는 중이야.\n\n뭐에 얼마 드는지 궁금하면 댓글로 물어봐.\n실제 결제하는 것 기준으로 알려줄게."}, {"id": "009", "day": "카드뉴스 (인스타)", "소재": 2, "기둥": "A", "type": "carousel", "angle": "손실 경고 리스트", "status": "대기", "cards": ["AI 음악 채널,\n시작 전에 무너지는\n3가지 이유", "① 타깃 없이 시작한다\n\"좋은 노래 만들면 알아서 듣겠지\"\n유튜브에서 제일 흔한 착각이다.\n누구에게 들려줄지가 곡보다 먼저다.", "② 도구 수집가가 된다\n강의 듣고, 툴 결제하고, 세팅만 한 달.\n정작 곡은 0개.\n도구는 3개면 충분하다.", "③ 저작권 지뢰를 밟는다\n커버곡은 내 채널인데 내 것이 아니다.\n신고 한 방이면 전부 사라진다.\n처음부터 '내 곡'으로 시작해야 한다.", "나는 ③번을 밟고\n채널을 통째로 갈아엎었다.\n그 뒤로 만든 원칙을\n지도 한 장에 정리했다.", "'AI유튜브 시작지도'\n프로필 링크에서\n무료로 받을 수 있다."], "caption": "AI 음악 채널, 시작 전에 무너지는 3가지 이유.\n저장해뒀다가 시작할 때 다시 봐.\n\n#AI부업 #유튜브부업 #AI음악 #수익화 #N잡"}, {"id": "010", "day": "카드뉴스 (인스타)", "소재": 8, "기둥": "A", "type": "carousel", "angle": "숫자 대비", "status": "대기", "cards": ["AI 음악 채널\n한 달 유지비\n전부 공개", "시작 전 예상: 수십만 원\n편집 프로그램, 음원 제작,\n디자인 툴…\n다 돈이라고 생각했다.", "실제: 커피 몇 잔 값\n곡 생성 구독 하나가\n거의 전부다.", "영상 편집 프로그램? 없어도 된다.\n썸네일? AI로 끝.\n녹음실? 필요 없다.", "부업을 막던 건\n실력이 아니라 초기 비용이었다.\n이 판엔 그 장벽이 없다.", "시작 순서가 궁금하면\n'AI유튜브 시작지도'\n프로필 링크에서 무료로."], "caption": "AI 음악 채널 한 달 유지비, 전부 공개.\n저장해뒀다가 시작할 때 다시 봐.\n\n#AI부업 #유튜브부업 #AI음악 #수익화 #N잡"}];
const PILLAR = {A:"A 실전지식", B:"B 운영기록", C:"C 공감동기", D:"D 배포이벤트"};
const list = document.getElementById("list");
let lastDay = null;
POSTS.forEach(p => {
  if (p.day !== lastDay) {
    const h = document.createElement("div");
    h.className = "dayhead";
    h.textContent = p.day === "보류" ? "⏸ 보류 (때 되면 투입)" : "📅 " + p.day;
    list.appendChild(h);
    lastDay = p.day;
  }
  const el = document.createElement("div");
  el.className = "post";
  const meta = document.createElement("div");
  meta.className = "meta";
  meta.innerHTML =
    '<span class="chip ' + (p.type === "threads" ? "thr" : "car") + '">' +
      (p.type === "threads" ? "🧵 쓰레드" : "🖼 인스타 카드뉴스") + "</span>" +
    '<span class="chip">' + (PILLAR[p.기둥] || p.기둥) + "</span>" +
    '<span class="chip">소재 #' + p.소재 + " · " + p.angle + "</span>" +
    (p.status === "보류" ? '<span class="chip hold">보류</span>' : "");
  el.appendChild(meta);

  let copyText = "";
  if (p.type === "threads") {
    const b = document.createElement("div");
    b.className = "body";
    b.textContent = p.text;
    el.appendChild(b);
    copyText = p.text;
  } else {
    p.cards.forEach((c, i) => {
      const s = document.createElement("div");
      s.className = "slide";
      const labels = ["표지", "", "", "", "", "CTA"];
      s.innerHTML = '<div class="no">' + (i + 1) + "장" +
        (i === 0 ? " · 표지" : i === p.cards.length - 1 ? " · CTA" : "") + "</div>";
      const t = document.createElement("div");
      t.textContent = c;
      s.appendChild(t);
      el.appendChild(s);
    });
    const cap = document.createElement("div");
    cap.className = "cap";
    cap.textContent = "캡션: " + p.caption;
    el.appendChild(cap);
    copyText = p.cards.map((c, i) => "[" + (i + 1) + "장]\n" + c).join("\n\n") +
               "\n\n[캡션]\n" + p.caption;
  }
  if (p.note) {
    const n = document.createElement("div");
    n.className = "note";
    n.textContent = "⚠ " + p.note;
    el.appendChild(n);
  }
  const btn = document.createElement("button");
  btn.className = "copy";
  btn.textContent = "📋 복사";
  btn.onclick = async () => {
    try {
      await navigator.clipboard.writeText(copyText);
      btn.textContent = "✅ 복사됨!";
    } catch (e) {
      btn.textContent = "❌ 길게 눌러 직접 복사";
    }
    setTimeout(() => (btn.textContent = "📋 복사"), 1800);
  };
  el.appendChild(btn);
  list.appendChild(el);
});
