<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>발행 대기함 — ebook-feed</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Pretendard Variable', Pretendard, -apple-system, sans-serif;
         background:#0f1115; color:#e8eaed; line-height:1.7; padding:26px 14px 80px; }
  .wrap { max-width:560px; margin:0 auto; }
  h1 { font-size:20px; font-weight:800; }
  .sub { color:#9aa0a6; font-size:12.5px; margin:4px 0 18px; }
  .howto { background:#1d2333; border:1px solid #2c3350; border-radius:12px;
           padding:12px 14px; font-size:13px; margin-bottom:22px; }
  .howto b { color:#ffd666; }
  .dayhead { font-size:13px; font-weight:800; color:#ffd666; margin:26px 0 10px; }
  .post { background:#171a21; border:1px solid #262b36; border-radius:16px;
          padding:16px 16px 14px; margin-bottom:12px; }
  .meta { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
  .chip { font-size:11px; font-weight:700; padding:2px 9px; border-radius:20px; background:#232836; color:#aeb6c4; }
  .chip.thr { background:#0d2b3d; color:#7cd3ff; }
  .chip.car { background:#3a1d31; color:#f7a8d8; }
  .chip.hold { background:#3d2f00; color:#ffd666; }
  .body { font-size:14.5px; white-space:pre-line; }
  .slide { background:#101317; border:1px solid #232836; border-radius:10px;
           padding:10px 12px; margin-bottom:8px; font-size:14px; font-weight:600; white-space:pre-line; }
  .slide .no { font-size:10.5px; color:#8a93a3; font-weight:700; margin-bottom:3px; }
  .cap { font-size:12.5px; color:#9aa0a6; white-space:pre-line; margin-top:6px; }
  .note { font-size:12.5px; color:#ff9d66; margin-top:8px; }
  button.copy { margin-top:12px; width:100%; padding:11px; border:0; border-radius:10px;
                background:#2c3350; color:#e8eaed; font-family:inherit; font-size:14px;
                font-weight:700; cursor:pointer; }
  button.copy:active { background:#3a4266; }
  .foot { margin-top:34px; font-size:11.5px; color:#5f6672; }
  .foot a { color:#8ab4f8; }
</style>
</head>
<body>
<div class="wrap">
  <h1>📮 발행 대기함</h1>
  <div class="sub">갱신 2026-07-11 · 복사 버튼 → 쓰레드/인스타 앱에 붙여넣기</div>
  <div class="howto">
    <b>쓰는 법</b><br>
    ① 글 아래 <b>복사</b> 버튼 누르기<br>
    ② 쓰레드(또는 인스타) 앱 열어서 붙여넣기 → 발행<br>
    ③ 카드뉴스는 장별 문구 — 이미지는 컴퓨터에서 자동 생성 예정(2단계)
  </div>
  <div id="list"></div>
  <div class="foot">
    벤치마크 보드 <a href="./index.html">보기</a> · 샘플 <a href="./samples.html">보기</a><br>
    글 추가는 "글 뽑아줘" 한마디 → 자동 갱신됨
  </div>
</div>
<script>
const POSTS = [{"id": "001", "day": "1일차", "소재": 6, "기둥": "B", "type": "threads", "angle": "감정후크", "status": "대기", "text": "채널 하나를 통째로 갈아엎었다.\n\nAI 커버곡으로 시작했었다. 조회수도 나왔다.\n근데 어느 날 깨달았다. 이 채널에 내 곡이 한 곡도 없다는 걸.\n\n저작권 신고 한 방이면 전부 사라지는 구조 위에 서 있었던 거다.\n\n그날 커버 노선을 전부 폐기하고 자작곡으로 갈아탔다.\n지금 내 채널의 곡은 전부 내 소유다. 누가 신고해도 안 무너진다.\n\nAI 음악 시작할 거면 이 지뢰부터 피해라.\n내일 저작권 지뢰 3개를 정리해서 올린다. 팔로우 해두면 안 놓친다."}, {"id": "002", "day": "1일차", "소재": 8, "기둥": "A", "type": "threads", "angle": "호기심갭", "status": "대기", "text": "AI 음악 채널 한 달 유지비, 공개한다.\n\n시작 전엔 나도 수십만 원 들 줄 알았다.\n편집 프로그램, 음원 제작, 디자인 툴. 다 돈이니까.\n\n실제로는 커피 몇 잔 값이다.\n\n1. 곡 생성 구독 하나가 거의 전부\n2. 영상 편집은 프로그램 없이 해결한다 (이 방법은 따로 푼다)\n3. 썸네일도 AI로 끝\n\n부업을 막던 게 '초기 비용'이었다면, 이 판은 그 장벽이 없다.\n\n저장해두고, 오늘 밤 곡 하나부터 만들어봐."}, {"id": "003", "day": "1일차", "소재": 2, "기둥": "A", "type": "carousel", "angle": "호기심갭", "status": "대기", "cards": ["AI 음악 채널,\n시작 전에 무너지는\n3가지 이유", "① 타깃 없이 시작한다\n\"좋은 노래 만들면 알아서 듣겠지\"\n유튜브에서 제일 흔한 착각이다.\n누구에게 들려줄지가 곡보다 먼저다.", "② 도구 수집가가 된다\n강의 듣고, 툴 결제하고, 세팅만 한 달.\n정작 곡은 0개.\n도구는 3개면 충분하다.", "③ 저작권 지뢰를 밟는다\n커버곡은 내 채널인데 내 것이 아니다.\n신고 한 방이면 전부 사라진다.\n처음부터 '내 곡'으로 시작해라.", "나는 ③번을 밟고\n채널을 통째로 갈아엎었다.\n그 뒤로 만든 원칙을\n지도 한 장에 정리했다.", "'AI유튜브 시작지도'\n프로필 링크에서\n무료로 받아가라."], "caption": "AI 음악 채널, 시작 전에 무너지는 3가지 이유.\n저장해두고 시작할 때 다시 봐.\n\n#AI부업 #유튜브부업 #AI음악 #수익화 #N잡"}, {"id": "004", "day": "2일차", "소재": 5, "기둥": "A", "type": "threads", "angle": "공감상황", "status": "대기", "text": "어제 말한 저작권 지뢰 3개, 정리한다.\nAI 음악 시작하는 사람 대부분이 이 중 하나는 밟는다.\n\n1. 커버곡\n조회수는 나온다. 근데 원곡 권리자가 신고하면 채널째 사라진다. 수익도 원래 주인 것.\n\n2. 무료 플랜으로 수익화\n곡 생성 툴 무료 플랜은 상업적 사용이 안 된다. 수익 창출 버튼을 켜는 순간 위반이다.\n\n3. '느낌만 비슷하게'\n멜로디를 따라 하면 그것도 지뢰다. 명곡의 감정만 가져오고, 곡은 새로 만들어야 한다.\n\n나는 1번을 밟고 채널을 갈아엎었다. 너는 밟지 마라.\n저장해두고 시작 전에 다시 봐."}, {"id": "005", "day": "2일차", "소재": 20, "기둥": "C", "type": "threads", "angle": "공감상황", "status": "대기", "text": "\"음치인데 AI 음악 채널 가능한가요?\"\n\n제일 많이 받는 질문인데, 답부터 말한다.\n나 악보 못 읽는다.\n\n이 판에서 필요한 건 노래 실력이 아니라 두 가지다.\n\n1. 어떤 감정을 담을지 정하는 것\n2. 나온 곡 중에 좋은 걸 고르는 귀\n\n부르는 건 AI가 한다. 고르는 건 내가 한다.\n'가수의 재능'이 아니라 '듣는 사람의 감각'이면 충분하다.\n\n노래방에서 마이크 안 잡는 사람도 좋은 노래는 안다.\n그 감각이면 된다.\n\n시작 못 하는 이유가 실력이었다면, 오늘 그 핑계는 사라졌다."}, {"id": "006", "day": "3일차", "소재": 1, "기둥": "C", "type": "threads", "angle": "호기심갭", "status": "대기", "text": "10년 전엔 노래 하나 내려면 작곡가, 작사가, 보컬, 편곡, 녹음실이 필요했다.\n\n지금은 방에서 혼자 다 한다.\n\n1. 작곡·보컬 — AI가 곡을 만들고 불러준다\n2. 가사 — AI랑 같이 쓴다\n3. 영상·썸네일 — 자동으로 뽑는다\n\n'혼자서는 불가능'했던 구조가 무너진 거다.\n\n이 변화를 아는 사람과 모르는 사람의 격차는 1년 뒤에 벌어져 있을 거다.\n\n나는 이 방법으로 실제 채널을 굴리는 중이고,\n그 과정을 여기에 순서대로 올린다. 팔로우 해두면 안 놓친다."}, {"id": "007", "day": "3일차", "소재": 8, "기둥": "A", "type": "carousel", "angle": "호기심갭", "status": "대기", "cards": ["AI 음악 채널\n한 달 유지비\n전부 공개", "시작 전 예상: 수십만 원\n편집 프로그램, 음원 제작,\n디자인 툴…\n다 돈이라고 생각했다.", "실제: 커피 몇 잔 값\n곡 생성 구독 하나가\n거의 전부다.", "영상 편집 프로그램? 없어도 된다.\n썸네일? AI로 끝.\n녹음실? 필요 없다.", "부업을 막던 건\n실력이 아니라 초기 비용이었다.\n이 판엔 그 장벽이 없다.", "시작 순서가 궁금하면\n'AI유튜브 시작지도'\n프로필 링크에서 무료로."], "caption": "AI 음악 채널 한 달 유지비, 전부 공개.\n저장해두고 시작할 때 다시 봐.\n\n#AI부업 #유튜브부업 #AI음악 #수익화 #N잡"}, {"id": "008", "day": "보류", "소재": 29, "기둥": "D", "type": "threads", "angle": "호기심갭", "status": "보류", "note": "성장 엔진. 평소 글 7~8개 발행하고 반응 생긴 뒤 투입 + 프로필 고정. 2~3주 간격 반복.", "text": "AI로 노래 만들어서 유튜브 채널 굴리는 법, 전자책으로 정리해서 그냥 푼다.\n\n나는 이 방법으로 지금 실제 채널을 운영 중이다.\n이론이 아니라 내가 매일 쓰는 순서 그대로 담았다.\n\n1. 시작 전에 무너지는 3가지 이유 (저작권 지뢰 포함)\n2. 월 유지비 전부 공개 — 커피 몇 잔 값이다\n3. 오늘 밤 30분, 첫 곡 만드는 코스\n\n받는 법\n① 좋아요 + 팔로우 + 리포스트\n② 댓글에 \"지도\"\n\n확인하고 바로 보내준다.\n폴더에 쌓아두고 안 읽을 사람은 그냥 지나가라."}];
const PILLAR = {A:"A 실전지식", B:"B 운영기록", C:"C 공감동기", D:"D 배포이벤트"};
const list = document.getElementById("list");
let lastDay = null;
POSTS.forEach(p => {
  if (p.day !== lastDay) {
    const h = document.createElement("div");
    h.className = "dayhead";
    h.textContent = p.day === "보류" ? "⏸ 보류 (때 되면 투입)" : "📅 " + p.day;
    list.appendChild(h);
    lastDay = p.day;
  }
  const el = document.createElement("div");
  el.className = "post";
  const meta = document.createElement("div");
  meta.className = "meta";
  meta.innerHTML =
    '<span class="chip ' + (p.type === "threads" ? "thr" : "car") + '">' +
      (p.type === "threads" ? "🧵 쓰레드" : "🖼 인스타 카드뉴스") + "</span>" +
    '<span class="chip">' + (PILLAR[p.기둥] || p.기둥) + "</span>" +
    '<span class="chip">소재 #' + p.소재 + " · " + p.angle + "</span>" +
    (p.status === "보류" ? '<span class="chip hold">보류</span>' : "");
  el.appendChild(meta);

  let copyText = "";
  if (p.type === "threads") {
    const b = document.createElement("div");
    b.className = "body";
    b.textContent = p.text;
    el.appendChild(b);
    copyText = p.text;
  } else {
    p.cards.forEach((c, i) => {
      const s = document.createElement("div");
      s.className = "slide";
      const labels = ["표지", "", "", "", "", "CTA"];
      s.innerHTML = '<div class="no">' + (i + 1) + "장" +
        (i === 0 ? " · 표지" : i === p.cards.length - 1 ? " · CTA" : "") + "</div>";
      const t = document.createElement("div");
      t.textContent = c;
      s.appendChild(t);
      el.appendChild(s);
    });
    const cap = document.createElement("div");
    cap.className = "cap";
    cap.textContent = "캡션: " + p.caption;
    el.appendChild(cap);
    copyText = p.cards.map((c, i) => "[" + (i + 1) + "장]\n" + c).join("\n\n") +
               "\n\n[캡션]\n" + p.caption;
  }
  if (p.note) {
    const n = document.createElement("div");
    n.className = "note";
    n.textContent = "⚠ " + p.note;
    el.appendChild(n);
  }
  const btn = document.createElement("button");
  btn.className = "copy";
  btn.textContent = "📋 복사";
  btn.onclick = async () => {
    try {
      await navigator.clipboard.writeText(copyText);
      btn.textContent = "✅ 복사됨!";
    } catch (e) {
      btn.textContent = "❌ 길게 눌러 직접 복사";
    }
    setTimeout(() => (btn.textContent = "📋 복사"), 1800);
  };
  el.appendChild(btn);
  list.appendChild(el);
});
</script>
</body>
</html>
