<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Pretendard Variable', Pretendard, -apple-system, sans-serif;
         background:#0f1115; color:#e8eaed; line-height:1.7; padding:26px 14px 80px; }
  .wrap { max-width:560px; margin:0 auto; }
  h1 { font-size:20px; font-weight:800; }
  .sub { color:#9aa0a6; font-size:12.5px; margin:4px 0 18px; }
  .howto { background:#1d2333; border:1px solid #2c3350; border-radius:12px;
           padding:12px 14px; font-size:13px; margin-bottom:22px; }
  .howto b { color:#ffd666; }
  .dayhead { font-size:13px; font-weight:800; color:#ffd666; margin:26px 0 10px; }
  .post { background:#171a21; border:1px solid #262b36; border-radius:16px;
          padding:16px 16px 14px; margin-bottom:12px; }
  .meta { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
  .chip { font-size:11px; font-weight:700; padding:2px 9px; border-radius:20px; background:#232836; color:#aeb6c4; }
  .chip.thr { background:#0d2b3d; color:#7cd3ff; }
  .chip.car { background:#3a1d31; color:#f7a8d8; }
  .chip.hold { background:#3d2f00; color:#ffd666; }
  .body { font-size:14.5px; white-space:pre-line; }
  .slide { background:#101317; border:1px solid #232836; border-radius:10px;
           padding:10px 12px; margin-bottom:8px; font-size:14px; font-weight:600; white-space:pre-line; }
  .slide .no { font-size:10.5px; color:#8a93a3; font-weight:700; margin-bottom:3px; }
  .cap { font-size:12.5px; color:#9aa0a6; white-space:pre-line; margin-top:6px; }
  .note { font-size:12.5px; color:#ff9d66; margin-top:8px; }
  button.copy { margin-top:12px; width:100%; padding:11px; border:0; border-radius:10px;
                background:#2c3350; color:#e8eaed; font-family:inherit; font-size:14px;
                font-weight:700; cursor:pointer; }
  button.copy:active { background:#3a4266; }
  .foot { margin-top:34px; font-size:11.5px; color:#5f6672; }
  .foot a { color:#8ab4f8; }
</style>
</head>
<body>
<div class="wrap">
  <h1>📮 발행 대기함</h1>
  <div class="sub">갱신 2026-07-11 · 복사 버튼 → 쓰레드/인스타 앱에 붙여넣기</div>
  <div class="howto">
    <b>쓰는 법</b><br>
    ① 글 아래 <b>복사</b> 버튼 누르기<br>
    ② 쓰레드(또는 인스타) 앱 열어서 붙여넣기 → 발행<br>
    ③ 카드뉴스는 장별 문구 — 이미지는 컴퓨터에서 자동 생성 예정(2단계)
  </div>
  <div id="list"></div>
  <div class="foot">
    벤치마크 보드 <a href="./index.html">보기</a> · 샘플 <a href="./samples.html">보기</a><br>
    글 추가는 "글 뽑아줘" 한마디 → 자동 갱신됨
  </div>
</div>
<script>
const POSTS = [{"id": "000", "day": "1일차", "소재": 0, "기둥": "B", "type": "threads", "angle": "H8 데뷔 스펙 서사 · T6", "status": "대기", "note": "계정 첫 글 + 프로필 고정. 발행 전 곡 수 숫자만 실제로 확인해서 조정.", "text": "안녕, 나는 회사 다니면서 밤마다 가수를 키우는 사람이야.\n사람이 아니라 AI 가수.\n\n작곡 못 하고, 악보도 못 읽어.\n근데 내 유튜브 채널에는 내가 만든 노래 수십 곡이 올라가 있고, 전부 저작권이 내 거야.\n\n퇴근 → 노래 만들기 → 영상은 자동 → 발행.\n이 구조 만들다가 채널 노선 하나를 통째로 갈아엎은 적도 있어.\n\n여기엔 그 시행착오랑 방법을 순서대로 남길 거야.\n얼굴 없이, 노래로 채널 키우는 이야기.\n\n궁금하면 팔로우해두고 같이 가자."}, {"id": "001", "day": "1일차", "소재": 6, "기둥": "B", "type": "threads", "angle": "H2 사건 서사 · T1", "status": "대기", "text": "채널 하나를 통째로 갈아엎았다.\n\nAI 커버곡으로 시작했었다. 조회수도 나왔다.\n근데 어느 날 깨달았다.\n이 채널에 내 곡이 한 곡도 없다는 걸.\n\n저작권 신고 한 방이면 전부 사라지는 구조 위에 서 있었던 거다.\n\n그날 커버를 전부 폐기하고 자작곡으로 갈아탔다.\n지금 내 채널의 곡은 전부 내 소유다.\n누가 신고해도 안 무너진다.\n\n내일 이 저작권 지뢰 3개를 정리해서 올린다.\n팔로우 해두면 안 놓친다."}, {"id": "002", "day": "2일차", "소재": 8, "기둥": "A", "type": "threads", "angle": "H3 직함 단언 · T2", "status": "대기", "text": "AI 음악 채널 유지비, 실제 운영자가 답 드립니다.\n\n한 달에 커피 몇 잔 값입니다.\n\n1. 곡 생성 구독 하나 — 이게 거의 전부다\n2. 영상 편집 프로그램 — 필요 없다. 나는 안 쓴다\n3. 마이크, 녹음실 — 필요 없다. 부르는 건 AI다\n4. 썸네일 — AI로 만든다\n\n이 판은 돈이 드는 게 아니라\n순서를 모르는 게 비싸다.\n\n저장해두고, 시작할 때 다시 봐라."}, {"id": "003", "day": "2일차", "소재": 5, "기둥": "A", "type": "threads", "angle": "H6 손실 경고 · T2 (001 연재 회수)", "status": "대기", "text": "어제 말한 저작권 지뢰 3개, 정리한다.\nAI 음악 시작하는 사람 대부분이 이 중 하나는 밟는다.\n\n1. 커버곡\n조회수는 빨리 붙는다. 근데 신고 한 방이면 영상이 아니라 채널이 사라진다. 수익도 원곡 주인 것.\n\n2. 무료 플랜으로 수익화\n곡 생성 툴 무료 플랜은 상업적 사용 불가. 수익 버튼 켜는 순간 위반이다.\n\n3. '느낌만 비슷하게'\n멜로디를 따라 하면 그것도 지뢰. 명곡의 감정만 가져오고 곡은 새로 만든다.\n\n나는 1번을 밟고 채널을 갈아엎었다.\n너는 밟지 마라. 저장해두고 시작 전에 다시 봐."}, {"id": "004", "day": "3일차", "소재": 9, "기둥": "A", "type": "threads", "angle": "H5 숫자 대비 · T2 (저장가치)", "status": "대기", "text": "오늘 밤 30분이면 인생 첫 곡이 나온다.\n악보 몰라도 된다. 순서만 따라와.\n\nSTEP 1. 감정 한 줄 정하기 (5분)\n'새벽에 혼자 듣는 위로' — 이런 한 문장이면 된다\n\nSTEP 2. AI랑 가사 초안 뽑기 (10분)\n\nSTEP 3. 수노(Suno)에 넣고 두 버전 생성 (10분)\n\nSTEP 4. 더 좋은 쪽 고르기 (5분)\n\n끝. 이게 진짜 전부다.\n\n저장해두고 오늘 밤 따라 해봐.\n막히면 댓글로. 다음 글에서 순서대로 풀어줄 거니까 팔로우 해두고."}, {"id": "005", "day": "3일차", "소재": 20, "기둥": "C", "type": "threads", "angle": "H9 질문 인용 · T5 (답글 목표)", "status": "대기", "text": "\"음치인데 AI 음악 채널 가능한가요?\"\n\n제일 많이 받는 질문인데, 나 악보 못 읽는다.\n\n이 판에 필요한 건 딱 두 가지다.\n\n1. 어떤 감정을 담을지 정하는 것\n2. 나온 곡 중 좋은 걸 고르는 귀\n\n부르는 건 AI가 한다. 고르는 건 사람이 한다.\n노래방에서 마이크 안 잡는 사람도 좋은 노래는 안다.\n그 감각이면 충분하다.\n\n너를 시작 못 하게 막는 건 뭐야?\n실력? 시간? 장비?\n댓글로 남겨줘. 내가 겪은 만큼은 다 답해줄게."}, {"id": "006", "day": "이벤트 (글 6개 발행 후)", "소재": 29, "기둥": "D", "type": "threads", "angle": "H10 무료 나눔 · T7 (성장 엔진)", "status": "보류", "note": "글 6개 이상 발행 + 반응 생긴 뒤 투입. 발행 즉시 프로필 고정 교체. 2~3주 간격 반복.", "text": "AI로 노래 만들어서 유튜브 채널 굴리는 법, 전자책으로 정리해서 그냥 푼다.\n\n나는 이 방법으로 지금 실제 채널을 운영 중이다.\n이론이 아니라 내가 매일 쓰는 순서 그대로 담았다.\n\n1. 시작 전에 무너지는 3가지 이유 (저작권 지뢰 포함)\n2. 월 유지비 전부 공개 — 커피 몇 잔 값이다\n3. 오늘 밤 30분, 첫 곡 만드는 코스\n\n받는 법\n① 좋아요 + 팔로우 + 리포스트\n② 댓글에 \"지도\"\n\n확인하고 바로 보내준다.\n폴더에 쌓아두고 안 읽을 사람은 그냥 지나가라."}, {"id": "007", "day": "예비 B안 (A 반응 보고 5~7일 뒤)", "소재": 6, "기둥": "A", "type": "threads", "angle": "H6 손실 경고 · T4 (001의 B안)", "status": "보류", "note": "001(사건서사)과 같은 소재, 다른 훅. 반응 비교용.", "text": "AI 커버곡으로 유튜브 시작하려는 사람, 멈춰라.\n그 채널, 열심히 키울수록 크게 무너진다.\n\n커버곡은 조회수가 빨리 붙는다. 그래서 다들 시작한다.\n근데 그 채널의 곡은 단 한 곡도 네 것이 아니다.\n\n원곡 권리자가 신고 한 번 하면\n영상이 아니라 채널이 사라진다.\n수익? 애초에 원곡 주인 것이다.\n\n나는 이걸 겪고 자작곡으로 갈아탔다.\n지금은 누가 신고해도 안 무너진다. 전부 내 곡이니까.\n\n순서는 이거다: 자작곡 → 채널 → 수익.\n저장해두고 시작 전에 다시 봐."}, {"id": "008", "day": "예비 B안 (A 반응 보고 5~7일 뒤)", "소재": 8, "기둥": "A", "type": "threads", "angle": "H4 기대 뒤집기 · T4 (002의 B안, 댓글 목표)", "status": "보류", "note": "002(단언 매뉴얼)와 같은 소재, 다른 훅·다른 지표 목표.", "text": "부업 알아보면 다 그럴듯해 보이지.\n근데 대부분 시작도 전에 돈부터 나간다.\n\n강의 몇십만 원. 장비. 툴 구독.\n배우다가 지쳐서 끝난다.\n\nAI 음악 채널은 반대다.\n곡 만드는 구독 하나. 커피 몇 잔 값.\n편집 프로그램도, 마이크도, 얼굴도 필요 없다.\n\n나는 이걸로 실제 채널을 굴리는 중이다.\n\n뭐에 얼마 드는지 궁금하면 댓글로 물어봐.\n실제 쓰는 것 기준으로 다 알려줄게."}, {"id": "009", "day": "카드뉴스 (인스타)", "소재": 2, "기둥": "A", "type": "carousel", "angle": "손실 경고 리스트", "status": "대기", "cards": ["AI 음악 채널,\n시작 전에 무너지는\n3가지 이유", "① 타깃 없이 시작한다\n\"좋은 노래 만들면 알아서 듣겠지\"\n유튜브에서 제일 흔한 착각이다.\n누구에게 들려줄지가 곡보다 먼저다.", "② 도구 수집가가 된다\n강의 듣고, 툴 결제하고, 세팅만 한 달.\n정작 곡은 0개.\n도구는 3개면 충분하다.", "③ 저작권 지뢰를 밟는다\n커버곡은 내 채널인데 내 것이 아니다.\n신고 한 방이면 전부 사라진다.\n처음부터 '내 곡'으로 시작해라.", "나는 ③번을 밟고\n채널을 통째로 갈아엎었다.\n그 뒤로 만든 원칙을\n지도 한 장에 정리했다.", "'AI유튜브 시작지도'\n프로필 링크에서\n무료로 받아가라."], "caption": "AI 음악 채널, 시작 전에 무너지는 3가지 이유.\n저장해두고 시작할 때 다시 봐.\n\n#AI부업 #유튜브부업 #AI음악 #수익화 #N잡"}, {"id": "010", "day": "카드뉴스 (인스타)", "소재": 8, "기둥": "A", "type": "carousel", "angle": "숫자 대비", "status": "대기", "cards": ["AI 음악 채널\n한 달 유지비\n전부 공개", "시작 전 예상: 수십만 원\n편집 프로그램, 음원 제작,\n디자인 툴…\n다 돈이라고 생각했다.", "실제: 커피 몇 잔 값\n곡 생성 구독 하나가\n거의 전부다.", "영상 편집 프로그램? 없어도 된다.\n썸네일? AI로 끝.\n녹음실? 필요 없다.", "부업을 막던 건\n실력이 아니라 초기 비용이었다.\n이 판엔 그 장벽이 없다.", "시작 순서가 궁금하면\n'AI유튜브 시작지도'\n프로필 링크에서 무료로."], "caption": "AI 음악 채널 한 달 유지비, 전부 공개.\n저장해두고 시작할 때 다시 봐.\n\n#AI부업 #유튜브부업 #AI음악 #수익화 #N잡"}];
const PILLAR = {A:"A 실전지식", B:"B 운영기록", C:"C 공감동기", D:"D 배포이벤트"};
const list = document.getElementById("list");
let lastDay = null;
POSTS.forEach(p => {
  if (p.day !== lastDay) {
    const h = document.createElement("div");
    h.className = "dayhead";
    h.textContent = p.day === "보류" ? "⏸ 보류 (때 되면 투입)" : "📅 " + p.day;
    list.appendChild(h);
    lastDay = p.day;
  }
  const el = document.createElement("div");
  el.className = "post";
  const meta = document.createElement("div");
  meta.className = "meta";
  meta.innerHTML =
    '<span class="chip ' + (p.type === "threads" ? "thr" : "car") + '">' +
      (p.type === "threads" ? "🧵 쓰레드" : "🖼 인스타 카드뉴스") + "</span>" +
    '<span class="chip">' + (PILLAR[p.기둥] || p.기둥) + "</span>" +
    '<span class="chip">소재 #' + p.소재 + " · " + p.angle + "</span>" +
    (p.status === "보류" ? '<span class="chip hold">보류</span>' : "");
  el.appendChild(meta);

  let copyText = "";
  if (p.type === "threads") {
    const b = document.createElement("div");
    b.className = "body";
    b.textContent = p.text;
    el.appendChild(b);
    copyText = p.text;
  } else {
    p.cards.forEach((c, i) => {
      const s = document.createElement("div");
      s.className = "slide";
      const labels = ["표지", "", "", "", "", "CTA"];
      s.innerHTML = '<div class="no">' + (i + 1) + "장" +
        (i === 0 ? " · 표지" : i === p.cards.length - 1 ? " · CTA" : "") + "</div>";
      const t = document.createElement("div");
      t.textContent = c;
      s.appendChild(t);
      el.appendChild(s);
    });
    const cap = document.createElement("div");
    cap.className = "cap";
    cap.textContent = "캡션: " + p.caption;
    el.appendChild(cap);
    copyText = p.cards.map((c, i) => "[" + (i + 1) + "장]\n" + c).join("\n\n") +
               "\n\n[캡션]\n" + p.caption;
  }
  if (p.note) {
    const n = document.createElement("div");
    n.className = "note";
    n.textContent = "⚠ " + p.note;
    el.appendChild(n);
  }
  const btn = document.createElement("button");
  btn.className = "copy";
  btn.textContent = "📋 복사";
  btn.onclick = async () => {
    try {
      await navigator.clipboard.writeText(copyText);
      btn.textContent = "✅ 복사됨!";
    } catch (e) {
      btn.textContent = "❌ 길게 눌러 직접 복사";
    }
    setTimeout(() => (btn.textContent = "📋 복사"), 1800);
  };
  el.appendChild(btn);
  list.appendChild(el);
});
</script>
</body>
</html>
